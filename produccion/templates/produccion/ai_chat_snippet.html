
<!-- AI Chat Widget -->
<div id="ai-chat-widget" class="position-fixed" style="bottom: 30px; right: 30px; z-index: 1060;">
    <button id="ai-chat-btn" class="btn btn-primary rounded-circle shadow-lg d-flex align-items-center justify-content-center" style="width: 65px; height: 65px; background: linear-gradient(135deg, #4F46E5, #9333EA); border: none;">
        <i class="fas fa-robot fa-2x text-white"></i>
    </button>
    <div id="ai-chat-panel" class="card shadow-lg border-0 d-none" style="width: 380px; position: absolute; bottom: 85px; right: 0; border-radius: 20px; overflow: hidden;">
        <div class="card-header text-white d-flex justify-content-between align-items-center" style="background: linear-gradient(135deg, #4F46E5, #9333EA);">
            <div class="fw-bold"><i class="fas fa-sparkles me-2"></i>Agente IA de Planificación</div>
            <button type="button" class="btn-close btn-close-white" id="ai-chat-close"></button>
        </div>
        <div class="card-body p-3" id="ai-chat-messages" style="height: 350px; overflow-y: auto; background-color: #f8f9fa;">
            <div class="d-flex mb-3">
                <div class="bg-white p-3 rounded-4 shadow-sm smaller w-85 border">
                    ¡Hola! Soy tu asistente inteligente. Dime qué necesitas organizar en el Gantt.<br><br><span class="text-muted">Ejemplo: "Pasame las órdenes que solapan con la falla del Tsugami TAM8J y ponelas al final del Haas"</span>
                </div>
            </div>
        </div>
        <div class="card-footer bg-white p-3">
            <form id="ai-chat-form" class="d-flex gap-2">
                <input type="text" id="ai-chat-input" class="form-control form-control-sm rounded-pill px-3" placeholder="Escribe tu instrucción..." autocomplete="off">
                <button type="submit" id="ai-chat-submit" class="btn btn-sm text-white rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 36px; height: 36px; background: linear-gradient(135deg, #4F46E5, #9333EA); border: none;">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const aiBtn = document.getElementById('ai-chat-btn');
        const aiPanel = document.getElementById('ai-chat-panel');
        const aiClose = document.getElementById('ai-chat-close');
        const aiForm = document.getElementById('ai-chat-form');
        const aiInput = document.getElementById('ai-chat-input');
        const aiMessages = document.getElementById('ai-chat-messages');
        const aiSubmit = document.getElementById('ai-chat-submit');

        if(!aiBtn) return;

        aiBtn.addEventListener('click', () => {
            aiPanel.classList.toggle('d-none');
            if(!aiPanel.classList.contains('d-none')) aiInput.focus();
        });
        aiClose.addEventListener('click', () => aiPanel.classList.add('d-none'));

        function appendMsg(text, isUser=false) {
            const div = document.createElement('div');
            div.className = `d-flex mb-3 ${isUser ? 'justify-content-end' : ''}`;
            div.innerHTML = `<div class="${isUser ? 'bg-primary text-white' : 'bg-white border text-dark'} p-2 rounded-4 shadow-sm smaller" style="max-width: 85%;">${text}</div>`;
            aiMessages.appendChild(div);
            aiMessages.scrollTop = aiMessages.scrollHeight;
        }

        aiForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const query = aiInput.value.trim();
            if(!query) return;
            
            appendMsg(query, true);
            aiInput.value = '';
            aiSubmit.disabled = true;
            aiSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            fetch("/planificacion/ai_chat/", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: query, scenario_id: typeof currentScenarioId !== "undefined" ? currentScenarioId : null })
            })
            .then(r => r.json())
            .then(data => {
                aiSubmit.disabled = false;
                aiSubmit.innerHTML = '<i class="fas fa-paper-plane"></i>';
                
                if(!data.success) {
                    appendMsg(`<i class="fas fa-exclamation-triangle text-danger me-1"></i> ${data.error || 'Error procesando tu orden'}`);
                } else {
                    appendMsg(`<i class="fas fa-check-circle text-success me-1"></i> ${data.message || 'Procesado'}`);
                    if(data.action === 'refresh') {
                        setTimeout(() => window.location.reload(), 2000);
                    }
                }
            })
            .catch(err => {
                aiSubmit.disabled = false;
                aiSubmit.innerHTML = '<i class="fas fa-paper-plane"></i>';
                appendMsg(`<i class="fas fa-wifi text-danger me-1"></i> Error de conexión con la IA`);
            });
        });
    });
</script>
</body>
