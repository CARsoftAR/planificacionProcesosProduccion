<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if maquina %}Editar{% else %}Nueva{% endif %} Máquina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="mb-4 text-secondary">
                        <i class="fas fa-robot me-2"></i>{% if maquina %}Editar{% else %}Nueva{% endif %} Máquina
                    </h3>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID de Máquina (Código)</label>
                            <input type="text" name="id_maquina" class="form-control form-control-lg" 
                                value="{{ maquina.id_maquina|default:'' }}" 
                                placeholder="Ej: MAC05" required>
                            {% if maquina %}
                            <div class="form-text text-warning"><i class="fas fa-exclamation-triangle"></i> Modificar el ID renombrará la máquina.</div>
                            {% endif %}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Descriptivo</label>
                            <input type="text" name="nombre" class="form-control form-control-lg" 
                                value="{{ maquina.nombre|default:'' }}" 
                                placeholder="Ej: TORNO CNC 1" required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Guardar</button>
                            <a href="{% url 'maquina_config_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
